<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעקב הזמנות לפי ערים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF7F2;--surface:#FFFFFF;--ink:#1E2A38;--muted:#6B7280;
    --accent:#D9A441;--accent-dark:#B8842E;--route:#3B6255;--route-light:#E4EEE9;
    --danger:#C1544C;--border:#E5DFD3;--new-badge:#3E6FA8;--new-badge-light:#E6EEF7;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  .app{max-width:760px;margin:0 auto;padding:16px;padding-bottom:80px;}
  header.top{display:flex;flex-direction:column;gap:2px;padding:14px 4px 18px;}
  header.top h1{font-size:22px;font-weight:800;margin:0;letter-spacing:-0.2px;}
  header.top p{margin:0;color:var(--muted);font-size:13px;}
  .tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:5px;margin-bottom:16px;}
  .tab{text-align:center;padding:9px 6px;border-radius:10px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;user-select:none;transition:all .15s ease;}
  .tab.active{background:var(--ink);color:#fff;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
  .stats-row{display:flex;gap:10px;margin-bottom:16px;}
  .stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 10px;text-align:center;}
  .stat .num{font-size:20px;font-weight:800;color:var(--ink);}
  .stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
  label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .field{margin-bottom:14px;}
  input,select{width:100%;padding:11px 12px;border-radius:10px;border:1.5px solid var(--border);font-family:'Heebo',sans-serif;font-size:15px;background:#fff;color:var(--ink);}
  input:focus,select:focus{outline:none;border-color:var(--accent);}
  .row2{display:flex;gap:10px;}
  .row2>div{flex:1;}
  button{font-family:'Heebo',sans-serif;cursor:pointer;border:none;border-radius:10px;font-weight:700;font-size:15px;padding:12px 16px;}
  .btn-primary{background:var(--accent);color:#2A1F0A;width:100%;}
  .btn-primary:active{background:var(--accent-dark);}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-danger-text{background:transparent;color:var(--danger);font-size:13px;padding:6px 10px;}
  .btn-ship{background:var(--route-light);color:var(--route);font-size:13px;font-weight:700;padding:8px 14px;border-radius:10px;width:auto;margin-top:10px;margin-inline-end:8px;}
  .btn-pack{background:var(--new-badge-light);color:var(--new-badge);font-size:13px;font-weight:700;padding:8px 14px;border-radius:10px;width:auto;margin-top:10px;}
  .search{margin-bottom:14px;}

  .animal-item{border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:10px;background:#fdfcfa;}
  .animal-row{display:flex;gap:8px;align-items:center;}
  .animal-row select{flex:2;}
  .animal-row input{flex:1;}
  .remove-animal-btn{background:transparent;border:1px solid var(--border);color:var(--muted);width:38px;height:38px;padding:0;border-radius:10px;font-size:16px;flex-shrink:0;}
  .info-btn{background:var(--new-badge-light);border:1px solid var(--new-badge-light);color:var(--new-badge);width:38px;height:38px;padding:0;border-radius:10px;font-size:16px;flex-shrink:0;}
  .animalColorSelect{margin-top:8px;}
  .row-price{font-size:12.5px;color:var(--accent-dark);font-weight:700;margin-top:6px;text-align:left;}
  .add-animal{font-size:13.5px;font-weight:700;color:var(--accent-dark);cursor:pointer;display:inline-block;margin-top:2px;}

  .pair-option{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13.5px;font-weight:500;color:var(--ink);background:var(--new-badge-light);padding:9px 12px;border-radius:10px;flex-wrap:wrap;}
  .pair-option input[type=checkbox]{width:auto;}
  .cage-toggle{display:flex;gap:6px;margin-top:6px;width:100%;}
  .cage-toggle button{flex:1;padding:6px 8px;font-size:12.5px;font-weight:600;border-radius:8px;background:#fff;border:1.5px solid var(--border);color:var(--muted);width:auto;}
  .cage-toggle button.active{background:var(--new-badge);color:#fff;border-color:var(--new-badge);}

  .total-price-box{background:var(--route-light);color:var(--route);border-radius:12px;padding:12px 14px;text-align:center;font-weight:800;font-size:16px;margin-bottom:14px;}

  .route-list{position:relative;padding-inline-start:22px;}
  .route-list::before{content:"";position:absolute;top:8px;bottom:8px;right:9px;width:2px;background:var(--route-light);}
  .city-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px;}
  .city-card::before{content:"";position:absolute;top:20px;right:-22px;width:11px;height:11px;border-radius:50%;background:var(--route);border:2px solid var(--bg);}
  .city-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;flex-wrap:wrap;gap:4px;}
  .city-name-wrap{display:flex;align-items:center;gap:8px;}
  .city-name{font-size:17px;font-weight:800;}
  .city-last{font-size:12px;color:var(--muted);}
  .badge-new{background:var(--new-badge-light);color:var(--new-badge);font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;}
  .city-breakdown{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
  .chip{background:var(--route-light);color:var(--route);font-size:12.5px;font-weight:600;padding:4px 10px;border-radius:20px;}
  .city-totals{font-size:13px;color:var(--muted);}
  .toggle-orders{font-size:13px;color:var(--accent-dark);font-weight:600;margin-top:8px;cursor:pointer;}
  .city-orders{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;display:none;}
  .city-orders.open{display:block;}

  .order-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
  .order-row:last-child{border-bottom:none;}
  .order-main{font-size:14.5px;font-weight:600;}
  .order-sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .order-actions{display:flex;gap:4px;flex-shrink:0;}
  .icon-btn{background:transparent;border:none;font-size:16px;padding:4px 6px;color:var(--muted);}

  .empty{text-align:center;padding:40px 10px;color:var(--muted);}
  .empty .big{font-size:34px;margin-bottom:8px;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s ease;pointer-events:none;z-index:50;}
  .toast.show{opacity:1;}

  .err{color:var(--danger);font-size:12px;margin-top:5px;font-weight:600;}
  .cancelled{opacity:0.5;}
  .cancelled .order-main, .cancelled .order-sub{text-decoration:line-through;}
  .badge-cancelled{background:var(--danger);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-inline-start:6px;text-decoration:none;display:inline-block;}
  .badge-shipped{background:var(--route);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-inline-start:6px;text-decoration:none;display:inline-block;}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(30,42,56,0.45);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:#fff;border-radius:16px;padding:22px;max-width:340px;width:100%;text-align:center;max-height:80vh;overflow-y:auto;}
  .modal-box p{font-size:15px;font-weight:600;margin:0 0 14px;color:var(--ink);}
  .modal-box input{margin-bottom:16px;}
  .modal-actions{display:flex;gap:10px;}
  .modal-actions button{flex:1;}
  .pack-item{display:flex;align-items:flex-start;gap:10px;padding:10px 2px;border-bottom:1px solid var(--border);cursor:pointer;}
  .pack-item:last-child{border-bottom:none;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
  <header class="top">
    <h1>🦜 מעקב הזמנות לפי ערים</h1>
    <p id="subtitle">טוען נתונים...</p>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="summary">סיכום ערים</div>
    <div class="tab" data-tab="add">הזמנה חדשה</div>
    <div class="tab" data-tab="all">כל ההזמנות</div>
    <div class="tab" data-tab="history">היסטוריית משלוחים</div>
  </div>

  <div id="tab-summary">
    <div class="stats-row">
      <div class="stat"><div class="num" id="statCities">0</div><div class="lbl">ערים פעילות</div></div>
      <div class="stat"><div class="num" id="statOrders">0</div><div class="lbl">הזמנות</div></div>
      <div class="stat"><div class="num" id="statUnits">0</div><div class="lbl">בעלי חיים</div></div>
    </div>
    <input class="search" id="citySearch" placeholder="חיפוש עיר...">
    <div class="route-list" id="cityList"></div>
  </div>

  <div id="tab-add" style="display:none;">
    <div class="card">
      <div class="field">
        <label>עיר</label>
        <select id="fCitySelect" onchange="handleCitySelectChange()"></select>
        <input id="fCityNew" placeholder="שם העיר החדשה" style="display:none;margin-top:8px;">
      </div>
      <div class="field">
        <label>שם לקוח *</label>
        <input id="fCustomer" placeholder="שם הלקוח">
      </div>
      <div class="field">
        <label>כתובת</label>
        <input id="fAddress" placeholder="רחוב ומספר בית">
      </div>
      <div class="row2">
        <div class="field">
          <label>טלפון 1 *</label>
          <input id="fPhone1" type="tel" placeholder="050-1234567">
          <div class="err" id="err1" style="display:none;"></div>
        </div>
        <div class="field">
          <label>טלפון 2 (לא חובה)</label>
          <input id="fPhone2" type="tel" placeholder="050-1234567">
          <div class="err" id="err2" style="display:none;"></div>
        </div>
      </div>

      <div class="field">
        <label>בעלי חיים בהזמנה</label>
        <div id="animalRows"></div>
        <div class="add-animal" onclick="addAnimalRow()">+ הוסף בעל חיים נוסף</div>
      </div>

      <div class="field" id="pairOptionsWrap" style="display:none;">
        <div id="pairOptions"></div>
      </div>

      <div class="total-price-box" id="totalPriceBox">סה"כ להזמנה: 0 ₪</div>

      <div class="field">
        <label>תאריך הזמנה</label>
        <input id="fDate" type="date">
      </div>
      <button class="btn-primary" id="submitBtn" onclick="submitOrder()">הוסף הזמנה</button>
      <div id="editNote" style="display:none;text-align:center;margin-top:10px;">
        <span class="btn-danger-text" onclick="cancelEdit()">בטל עריכה</span>
      </div>
    </div>
  </div>

  <div id="tab-all" style="display:none;">
    <input class="search" id="orderSearch" placeholder="חיפוש לפי עיר או לקוח...">
    <div class="card" id="allOrdersCard"></div>
  </div>

  <div id="tab-history" style="display:none;">
    <input class="search" id="historySearch" placeholder="חיפוש לקוח / טלפון / עיר בהיסטוריה...">
    <div class="route-list" id="historyList"></div>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <p id="confirmMessage"></p>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeConfirm(false)">ביטול</button>
      <button class="btn-primary" onclick="closeConfirm(true)">אישור</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="shipModal">
  <div class="modal-box">
    <p id="shipMessage">בחר תאריך משלוח:</p>
    <input type="date" id="shipDateInput">
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeShipModal(false)">ביטול</button>
      <button class="btn-primary" onclick="closeShipModal(true)">אישור והעברה להיסטוריה</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="packModal">
  <div class="modal-box">
    <p id="packTitle"></p>
    <div id="packContent"></div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn-primary" onclick="closePackModal()">סגור</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="infoModal">
  <div class="modal-box" style="text-align:right;">
    <p id="infoTitle" style="text-align:center;"></p>
    <div id="infoContent" style="font-size:14px;line-height:1.7;color:var(--ink);margin-bottom:16px;"></div>
    <div class="modal-actions"><button class="btn-primary" onclick="closeInfoModal()">סגור</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

const MOBILE_PREFIXES = ['050','051','052','053','054','055','056','057','058','059'];
const VOB_PREFIXES = ['072','073','074','076','077','078','079'];
const LANDLINE_PREFIXES = ['02','03','04','08','09'];

let orders = [];
let editingId = null;
let openCities = new Set();
let openShipments = new Set();

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}
function showConfirm(message, onConfirm){

  confirmCallback = onConfirm;
  document.getElementById('confirmModal').classList.add('open');
}
function closeConfirm(result){

}

/* ---------- animal rows ---------- */
function createAnimalRowHtml(id, type, qty, color){
  const opts = ANIMAL_OPTIONS.map(a=>{
    const price = PRICE_MAP[a];
    const priceLabel = price==null ? '(מחיר לא הוגדר)' : `— ${price} ₪`;
    return `<option value="${a}" ${a===type?'selected':''}>${a} ${priceLabel}</option>`;
  }).join('');
  return `<div class="animal-item" data-row-id="${id}">
    <div class="animal-row">
      <select class="animalTypeSelect">${opts}</select>
      <input type="number" class="animalQtyInput" min="1" value="${qty}">
      <button type="button" class="info-btn" onclick="showAnimalInfo('${id}')">ℹ️</button>
      <button type="button" class="remove-animal-btn" onclick="removeAnimalRow('${id}')">✕</button>
    </div>
    <select class="animalColorSelect" style="display:none;"></select>
    <div class="row-price"></div>
  </div>`;
}
function refreshRowExtras(rowEl){
  const type = rowEl.querySelector('.animalTypeSelect').value;
  const qty = parseInt(rowEl.querySelector('.animalQtyInput').value) || 1;
  const colorSel = rowEl.querySelector('.animalColorSelect');
  const colorOptions = getColorOptions(type);
  const prevColor = colorSel.dataset.currentValue || '';
  if(colorOptions){
    colorSel.innerHTML = colorOptions.map(c=>`<option value="${c}" ${c===prevColor?'selected':''}>${c}</option>`).join('');
    colorSel.style.display = 'block';
    if(!colorOptions.includes(prevColor)){ colorSel.value = colorOptions[0]; }
    colorSel.dataset.currentValue = colorSel.value;
  }else{
    colorSel.innerHTML='';
    colorSel.style.display='none';
    colorSel.dataset.currentValue='';
  }
  const color = colorSel.value || '';
  const base = PRICE_MAP[type];
  const surcharge = isWhiteColor(color) ? WHITE_SURCHARGE*qty : 0;
  const priceEl = rowEl.querySelector('.row-price');
  if(base==null){
    priceEl.textContent = 'מחיר לא הוגדר לפריט זה';
  }else{
    const linePrice = base*qty + surcharge;
    priceEl.textContent = `מחיר לשורה: ${linePrice} ₪${surcharge>0?' (כולל תוספת לבן)':''}`;
  }
}
function addAnimalRow(type, qty, color){
  animalRowCounter++;
  const id = 'row'+animalRowCounter;
  document.getElementById('animalRows').insertAdjacentHTML('beforeend', createAnimalRowHtml(id, type||ANIMAL_OPTIONS[0], qty||1, color));
  const rowEl = document.querySelector('.animal-item[data-row-id="'+id+'"]');
  if(color) rowEl.querySelector('.animalColorSelect').dataset.currentValue = color;
  refreshRowExtras(rowEl);
  updateRemoveButtonsVisibility();
  updatePairAndCageOptions();
  updateTotalPrice();
}
function removeAnimalRow(id){
  const rows = document.querySelectorAll('#animalRows .animal-item');
  if(rows.length <= 1) return;
  const el = document.querySelector('.animal-item[data-row-id="'+id+'"]');
  if(el) el.remove();
  updateRemoveButtonsVisibility();
  updatePairAndCageOptions();
  updateTotalPrice();
}
function updateRemoveButtonsVisibility(){
  const rows = document.querySelectorAll('#animalRows .animal-item');
  rows.forEach(r=>{ r.querySelector('.remove-animal-btn').style.display = rows.length>1 ? 'block' : 'none'; });
}
function resetAnimalRows(){
  document.getElementById('animalRows').innerHTML='';
  animalRowCounter=0;
  addAnimalRow();
}
function collectAnimalRows(){
  const rows = document.querySelectorAll('#animalRows .animal-item');
  const list = [];
  rows.forEach(r=>{
    const type = r.querySelector('.animalTypeSelect').value;
    const qty = parseInt(r.querySelector('.animalQtyInput').value) || 1;
    const colorSel = r.querySelector('.animalColorSelect');
    const color = (colorSel.style.display!=='none' && colorSel.value) ? colorSel.value : '';
    list.push({type, quantity:qty, color});
  });
  return list;
}
function aggregateByType(animalRows){
  const map = {};
  animalRows.forEach(a=>{ map[a.type] = (map[a.type]||0) + a.quantity; });
  return map;
}
function formatAnimals(animals, pairFlags, cageSharing){
  if(!animals || !animals.length) return 'לא צוין';
  return animals.map(a=>{
    let label = `${a.type}`;
    if(a.color && a.color.indexOf('ללא העדפה')!==0){ label += ` (${a.color})`; }
    label += ` ×${a.quantity}`;
    const notes = [];
    if(pairFlags && pairFlags[a.type]) notes.push('זכר ונקבה');
    if(cageSharing && cageSharing[a.type]==='one') notes.push('כלוב משותף');
    if(notes.length) label += ' - ' + notes.join(', ');
    return label;
  }).join(', ');
}
function computeOrderPrice(animalRows){
  let total = 0;
  animalRows.forEach(a=>{
    const base = PRICE_MAP[a.type];
    if(base==null) return;
    total += base*a.quantity;
    if(isWhiteColor(a.color)) total += WHITE_SURCHARGE*a.quantity;
  });
  return total;
}
function updateTotalPrice(){
  const rows = collectAnimalRows();
  const total = computeOrderPrice(rows);
  document.getElementById('totalPriceBox').textContent = `סה"כ להזמנה: ${total} ₪`;
}

/* ---------- pairing + cage-sharing ---------- */
function isPairEligible(type, qty){
  if(ALWAYS_PAIR_TYPES.includes(type)) return true;
  if(SINGLE_UNIT_TYPES.includes(type) && qty>=2) return true;
  return false;
}
function needsCageSharingChoice(type, qty){
  return SINGLE_UNIT_TYPES.includes(type) && qty>=2;
}
function updatePairAndCageOptions(){
  const rows = collectAnimalRows();
  const agg = aggregateByType(rows);
  const container = document.getElementById('pairOptions');
  const wrap = document.getElementById('pairOptionsWrap');

  const prevChecked = {};
  const prevCage = {};
  container.querySelectorAll('input[type=checkbox]').forEach(cb=>{ prevChecked[cb.dataset.pairType] = cb.checked; });
  container.querySelectorAll('.cage-toggle button.active').forEach(btn=>{ prevCage[btn.dataset.cageType] = btn.dataset.value; });

  const relevantTypes = Object.keys(agg).filter(t=> isPairEligible(t, agg[t]));
  if(relevantTypes.length===0){ container.innerHTML=''; wrap.style.display='none'; return; }
  wrap.style.display='block';

  container.innerHTML = '<label>אפשרויות זוגות</label>' + relevantTypes.map(type=>{
    const qty = agg[type];
    const showCage = needsCageSharingChoice(type, qty);
    const cageVal = prevCage[type] || 'two';
    const cageHtml = showCage ? `
      <div style="width:100%;">
        <div style="font-size:12.5px;color:var(--muted);margin-top:4px;">${type} — כלוב אחד או שני כלובים?</div>
        <div class="cage-toggle">
          <button type="button" data-cage-type="${type}" data-value="one" class="${cageVal==='one'?'active':''}" onclick="setCageSharing(this)">כלוב אחד</button>
          <button type="button" data-cage-type="${type}" data-value="two" class="${cageVal==='two'?'active':''}" onclick="setCageSharing(this)">שני כלובים</button>
        </div>
      </div>` : '';
    return `
      <div class="pair-option">
        <input type="checkbox" data-pair-type="${type}" ${prevChecked[type]?'checked':''}>
        <span>${type} — זכר ונקבה</span>
        ${cageHtml}
      </div>
    `;
  }).join('');
}
function setCageSharing(btn){
  const type = btn.dataset.cageType;
  const parent = btn.parentElement;
  parent.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function collectPairFlags(){
  const flags = {};
  document.querySelectorAll('#pairOptions input[type=checkbox]').forEach(cb=>{ flags[cb.dataset.pairType] = cb.checked; });
  return flags;
}
function collectCageSharing(){
  const map = {};
  document.querySelectorAll('#pairOptions .cage-toggle button.active').forEach(btn=>{ map[btn.dataset.cageType] = btn.dataset.value; });
  return map;
}

document.getElementById('animalRows').addEventListener('change', (e)=>{
  const rowEl = e.target.closest('.animal-item');

  const set = new Set();
  orders.forEach(o=> set.add(o.city));
  return Array.from(set).sort((a,b)=>a.localeCompare(b,'he'));
}
function populateCitySelect(selectedCity){
  const sel = document.getElementById('fCitySelect');
  const cities = getKnownCities();
  sel.innerHTML = '<option value="">בחר עיר...</option>' +
    cities.map(c=>`<option value="${c}">${c}</option>`).join('') +
    '<option value="__new__">+ עיר חדשה</option>';
  const newInput = document.getElementById('fCityNew');
  if(selectedCity && cities.includes(selectedCity)){
    sel.value = selectedCity; newInput.style.display='none'; newInput.value='';
  }else if(selectedCity){
    sel.value = '__new__'; newInput.style.display='block'; newInput.value = selectedCity;
  }else{
    sel.value = ''; newInput.style.display='none'; newInput.value='';
  }

function handleCitySelectChange(){

  const newInput = document.getElementById('fCityNew');
  if(sel.value === '__new__'){ newInput.style.display = 'block'; newInput.focus(); }
  else{ newInput.style.display = 'none'; newInput.value = ''; }

function getSelectedCity(){
  const sel = document.getElementById('fCitySelect');
  if(sel.value === '__new__') return document.getElementById('fCityNew').value.trim();

}

/* ---------- storage ---------- */
async function loadOrders(){
  try{
    const { data, error } = await supabaseClient.from('kv_store').select('value').eq('id', STORAGE_KEY).maybeSingle();
    if(error) throw error;
    orders = data && data.value ? data.value : [];
  }catch(e){ orders = []; }
  orders = orders.map(migrateOrder);
  document.getElementById('subtitle').textContent = 'מחובר ל-Supabase - נתונים משותפים לכל המכשירים';
  resetAnimalRows();
  populateCitySelect();
  renderAll();
  saveOrders();
}
async function saveOrders(){
  try{
    const { error } = await supabaseClient.from('kv_store').upsert({ id: STORAGE_KEY, value: orders, updated_at: new Date().toISOString() });
    if(error) throw error;
  }
  catch(e){ console.error(e); showToast('שגיאה בשמירה, נסה שוב'); }
}
function migrateOrder(o){
  if(!o.animals){
    o.animals = o.animalType ? [{type:o.animalType, quantity:o.quantity||1}] : [];
  }
  o.animals = o.animals.map(a=>({
    type: OLD_TO_NEW_ANIMAL_LABEL[a.type] || a.type,
    quantity: a.quantity,
    color: a.color || ''
  }));
  if(typeof o.cancelled !== 'boolean') o.cancelled = false;
  if(typeof o.delivered !== 'boolean') o.delivered = false;
  o.deliveryDate = o.deliveryDate || '';
  o.customer = o.customer || '';
  o.address = o.address || '';
  o.phone1 = o.phone1 || '';
  o.phone2 = o.phone2 || '';
  o.pairFlags = o.pairFlags || {};
  o.cageSharing = o.cageSharing || {};
  if(typeof o.totalPrice !== 'number') o.totalPrice = computeOrderPrice(o.animals);
  return o;
}

/* ---------- phone validation ---------- */
function validatePhone(raw){
  const cleaned = raw.replace(/[\s-]/g,'');
  if(cleaned === '') return {ok:true, empty:true};
  if(!/^\d+$/.test(cleaned)) return {ok:false, msg:'המספר חייב להכיל ספרות בלבד'};
  if(!cleaned.startsWith('0')) return {ok:false, msg:'המספר חייב להתחיל ב-0'};
  const p3 = cleaned.slice(0,3);
  const p2 = cleaned.slice(0,2);
  const looksLikeThreeDigitFamily = MOBILE_PREFIXES.includes(p3) || VOB_PREFIXES.includes(p3) ||
    (cleaned.length < 3 && (p2 === '05' || p2 === '07'));
  if(looksLikeThreeDigitFamily){
    const need = 10;
    if(cleaned.length < need) return {ok:false, msg:`חסרות ${need-cleaned.length} ספרות (נדרשות ${need} ספרות בסה"כ)`};
    if(cleaned.length > need) return {ok:false, msg:`יש ${cleaned.length-need} ספרות מיותרות (נדרשות ${need} ספרות בסה"כ)`};
    return {ok:true, formatted: p3+'-'+cleaned.slice(3)};
  }
  if(LANDLINE_PREFIXES.includes(p2)){
    const need = 9;
    if(cleaned.length < need) return {ok:false, msg:`חסרות ${need-cleaned.length} ספרות (נדרשות ${need} ספרות בסה"כ)`};
    if(cleaned.length > need) return {ok:false, msg:`יש ${cleaned.length-need} ספרות מיותרות (נדרשות ${need} ספרות בסה"כ)`};
    return {ok:true, formatted: p2+'-'+cleaned.slice(2)};
  }
  return {ok:false, msg:'קידומת לא קיימת בישראל'};
}

/* ---------- submit / edit ---------- */
function submitOrder(){
  const city = getSelectedCity();
  const customer = document.getElementById('fCustomer').value.trim();
  const address = document.getElementById('fAddress').value.trim();
  const phone1raw = document.getElementById('fPhone1').value.trim();
  const phone2raw = document.getElementById('fPhone2').value.trim();
  const date = document.getElementById('fDate').value || todayStr();
  const animals = collectAnimalRows();
  const pairFlags = collectPairFlags();
  const cageSharing = collectCageSharing();

  document.getElementById('err1').style.display='none';
  document.getElementById('err2').style.display='none';

  if(!city){ showToast('נא לבחור או להזין עיר'); return; }
  if(!customer){ showToast('שם לקוח הוא שדה חובה'); return; }
  if(!phone1raw){ showToast('טלפון 1 הוא שדה חובה'); return; }

  const v1 = validatePhone(phone1raw);
  if(!v1.ok){ document.getElementById('err1').textContent = v1.msg; document.getElementById('err1').style.display='block'; return; }
  const v2 = validatePhone(phone2raw);
  if(!v2.ok){ document.getElementById('err2').textContent = v2.msg; document.getElementById('err2').style.display='block'; return; }
  const phone1 = v1.formatted;
  const phone2 = v2.empty ? '' : v2.formatted;
  const totalPrice = computeOrderPrice(animals);

  if(editingId){
    const o = orders.find(x=>x.id===editingId);
    if(o){
      o.city = city; o.customer = customer; o.address = address;
      o.phone1 = phone1; o.phone2 = phone2; o.animals = animals; o.date = date;
      o.pairFlags = pairFlags; o.cageSharing = cageSharing; o.totalPrice = totalPrice;
    }
    editingId = null;
    document.getElementById('editNote').style.display = 'none';
    document.getElementById('submitBtn').textContent = 'הוסף הזמנה';
    showToast('ההזמנה עודכנה');
  }else{
    orders.push({
      id: Date.now().toString(36)+Math.random().toString(36).slice(2,7),
      city, customer, address, phone1, phone2, animals, date, pairFlags, cageSharing, totalPrice,
      cancelled:false, delivered:false, deliveryDate:'', createdAt: Date.now()
    });
    showToast('ההזמנה נוספה');
  }

  document.getElementById('fCustomer').value='';
  document.getElementById('fAddress').value='';
  document.getElementById('fPhone1').value='';
  document.getElementById('fPhone2').value='';
  document.getElementById('fDate').value=todayStr();
  resetAnimalRows();
  populateCitySelect();
  updateTotalPrice();

  saveOrders();
  renderAll();
  switchTab('summary');
}

function startEdit(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  editingId = id;
  populateCitySelect(o.city);
  document.getElementById('fCustomer').value = o.customer||'';
  document.getElementById('fAddress').value = o.address||'';
  document.getElementById('fPhone1').value = o.phone1||'';
  document.getElementById('fPhone2').value = o.phone2||'';
  document.getElementById('fDate').value = o.date;
  document.getElementById('animalRows').innerHTML='';
  animalRowCounter = 0;
  (o.animals && o.animals.length ? o.animals : [{type:ANIMAL_OPTIONS[0],quantity:1,color:''}]).forEach(a=>addAnimalRow(a.type, a.quantity, a.color));
  updatePairAndCageOptions();
  if(o.pairFlags){
    Object.entries(o.pairFlags).forEach(([type,val])=>{
      const cb = document.querySelector(`#pairOptions input[data-pair-type="${type}"]`);
      if(cb) cb.checked = val;
    });
  }
  if(o.cageSharing){
    Object.entries(o.cageSharing).forEach(([type,val])=>{
      document.querySelectorAll(`#pairOptions .cage-toggle button[data-cage-type="${type}"]`).forEach(btn=>{
        btn.classList.toggle('active', btn.dataset.value===val);
      });
    });
  }
  updateTotalPrice();
  document.getElementById('editNote').style.display = 'block';
  document.getElementById('submitBtn').textContent = 'שמור שינויים';
  switchTab('add');
}

function toggleCancel(id){
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  if(!o.cancelled){
    showConfirm('לבטל את ההזמנה הזו? היא תעבור ל"כל ההזמנות" עם סימון מבוטלת, ולא תיכלל בסיכום הערים.', ()=>{
      o.cancelled = true; saveOrders(); renderAll(); showToast('ההזמנה בוטלה');
    });
  }else{
    o.cancelled = false; saveOrders(); renderAll(); showToast('ההזמנה שוחזרה');
  }
}
function deleteOrder(id){
  showConfirm('למחוק הזמנה זו לצמיתות? לא ניתן לשחזר לאחר המחיקה.', ()=>{
    orders = orders.filter(o=>o.id!==id); saveOrders(); renderAll(); showToast('ההזמנה נמחקה');
  });
}

/* ---------- summary ---------- */
function computeCitySummary(){
  const map = {};
  orders.filter(o=>!o.cancelled && !o.delivered).forEach(o=>{
    if(!map[o.city]){
      map[o.city] = { city:o.city, count:0, totalQty:0, breakdown:{}, firstDate:o.date, lastDate:o.date, orders:[] };
    }
    const c = map[o.city];
    c.count += 1;
    (o.animals||[]).forEach(a=>{
      c.totalQty += a.quantity;
      c.breakdown[a.type] = (c.breakdown[a.type]||0) + a.quantity;
    });
    if(o.date > c.lastDate) c.lastDate = o.date;
    if(o.date < c.firstDate) c.firstDate = o.date;
    c.orders.push(o);
  });
  const list = Object.values(map);
  list.forEach(c=>{ c.isNew = c.count === 1; });
  return list.sort((a,b)=> b.lastDate.localeCompare(a.lastDate));
}
function countCages(breakdown){
  let total = 0;
  Object.entries(breakdown).forEach(([type,qty])=>{ if(type.includes('כלוב')) total += qty; });
  return total;
}
function formatDate(d){ if(!d) return ''; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; }
function relativeTime(dateStr){
  if(!dateStr) return '';
  const then = new Date(dateStr+'T00:00:00');
  const now = new Date();
  const diffDays = Math.floor((now-then)/(1000*60*60*24));
  if(diffDays<=0) return 'היום';
  if(diffDays===1) return 'אתמול';
  if(diffDays<7) return `לפני ${diffDays} ימים`;
  if(diffDays<30){ const w=Math.floor(diffDays/7); return `לפני ${w} שבוע${w>1?'ות':''}`; }
  if(diffDays<365){ const m=Math.floor(diffDays/30); return `לפני ${m} חודש${m>1?'ים':''}`; }
  const y=Math.floor(diffDays/365); return `לפני ${y} שנה${y>1?'ים':''}`;
}

function renderSummary(){
  const list = computeCitySummary();
  const search = document.getElementById('citySearch').value.trim();
  const filtered = search ? list.filter(c=>c.city.includes(search)) : list;

  const activeOrders = orders.filter(o=>!o.cancelled && !o.delivered);
  document.getElementById('statCities').textContent = list.length;
  document.getElementById('statOrders').textContent = activeOrders.length;
  document.getElementById('statUnits').textContent = activeOrders.reduce((s,o)=>s+(o.animals||[]).reduce((s2,a)=>s2+a.quantity,0),0);

  const container = document.getElementById('cityList');
  if(filtered.length===0){
    container.innerHTML = `<div class="empty"><div class="big">📍</div>עדיין אין הזמנות פעילות${search?' תואמות':''}.<br>לחץ על "הזמנה חדשה" כדי להתחיל.</div>`;
    return;
  }

  container.innerHTML = filtered.map(c=>{
    const chips = Object.entries(c.breakdown).map(([type,qty])=>`<span class="chip">${type} ×${qty}</span>`).join('');
    const cages = countCages(c.breakdown);
    const isOpen = openCities.has(c.city);
    const ordersHtml = c.orders.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(o=>`
      <div class="order-row">
        <div>
          <div class="order-main">${formatAnimals(o.animals,o.pairFlags,o.cageSharing)} — ${o.customer}</div>
          <div class="order-sub">${formatDate(o.date)}${o.address?' · '+o.address:''}${o.phone1?' · '+o.phone1:''}${o.phone2?', '+o.phone2:''} · 💰 ${o.totalPrice||0} ₪</div>
        </div>
        <div class="order-actions">
          <button class="icon-btn" onclick="startEdit('${o.id}')">✏️</button>
          <button class="icon-btn" onclick="toggleCancel('${o.id}')">🚫</button>
          <button class="icon-btn" onclick="deleteOrder('${o.id}')">🗑️</button>
        </div>
      </div>
    `).join('');

    return `
      <div class="city-card">
        <div class="city-head">
          <div class="city-name-wrap">
            <div class="city-name">${c.city}</div>
            ${c.isNew ? '<span class="badge-new">עיר חדשה</span>' : ''}
          </div>
          <div class="city-last">הזמנה ראשונה: ${formatDate(c.firstDate)}</div>
        </div>
        <div class="city-breakdown">${chips}</div>
        <div class="city-totals">${c.count} הזמנות · ${c.totalQty} בעלי חיים בסה"כ · 📦 ${cages} כלובים נדרשים למשלוח</div>
        <div class="toggle-orders" onclick="toggleCity('${c.city}')">${isOpen?'הסתר הזמנות ▲':'הצג הזמנות ▼'}</div>
        <div class="city-orders ${isOpen?'open':''}">${ordersHtml}</div>
        <button class="btn-pack" onclick="openPackModal('${c.city}')">📋 רשימת ליקוט למשלוח</button>
        <button class="btn-ship" onclick="openShipModal('${c.city}')">✅ סמן משלוח כבוצע</button>
      </div>
    `;
  }).join('');
}
function toggleCity(city){
  if(openCities.has(city)) openCities.delete(city); else openCities.add(city);
  renderSummary();
}

function renderAllOrders(){
  const search = document.getElementById('orderSearch').value.trim();
  let list = orders.slice().sort((a,b)=>b.date.localeCompare(a.date));
  if(search){ list = list.filter(o=> o.city.includes(search) || (o.customer||'').includes(search)); }
  const container = document.getElementById('allOrdersCard');
  if(list.length===0){ container.innerHTML = `<div class="empty"><div class="big">📋</div>לא נמצאו הזמנות.</div>`; return; }
  container.innerHTML = list.map(o=>`
    <div class="order-row ${o.cancelled?'cancelled':''}">
      <div>
        <div class="order-main">${o.city} — ${formatAnimals(o.animals,o.pairFlags,o.cageSharing)}${o.cancelled?'<span class="badge-cancelled">מבוטלת</span>':''}${(!o.cancelled && o.delivered)?'<span class="badge-shipped">נשלח '+formatDate(o.deliveryDate)+'</span>':''}</div>
        <div class="order-sub">${o.customer} · ${formatDate(o.date)}${o.address?' · '+o.address:''}${o.phone1?' · '+o.phone1:''}${o.phone2?', '+o.phone2:''} · 💰 ${o.totalPrice||0} ₪</div>
      </div>
      <div class="order-actions">
        <button class="icon-btn" onclick="startEdit('${o.id}')">✏️</button>
        <button class="icon-btn" onclick="toggleCancel('${o.id}')">${o.cancelled?'↩️':'🚫'}</button>
        <button class="icon-btn" onclick="deleteOrder('${o.id}')">🗑️</button>
      </div>
    </div>
  `).join('');
}

/* ---------- packing list ---------- */
function openPackModal(city){
  const list = computeCitySummary();
  const cityData = list.find(c=>c.city===city);
  if(!cityData) return;

  const typeStats = {};
  cityData.orders.forEach(o=>{
    (o.animals||[]).forEach(a=>{
      if(!typeStats[a.type]) typeStats[a.type] = {units:0, animals:0, pairUnits:0};
      typeStats[a.type].units += a.quantity;
      typeStats[a.type].animals += a.quantity * (ANIMALS_PER_UNIT[a.type]||1);
      if(o.pairFlags && o.pairFlags[a.type]){
        typeStats[a.type].pairUnits += a.quantity;
      }
    });
  });

  document.getElementById('packTitle').textContent = `📦 רשימת ליקוט למשלוח — ${city}`;
  let entries = Object.entries(typeStats).filter(([t,v])=>v.units>0);
  entries.sort((a,b)=> ANIMAL_OPTIONS.indexOf(a[0]) - ANIMAL_OPTIONS.indexOf(b[0]));

  const content = document.getElementById('packContent');
  if(entries.length===0){
    content.innerHTML = '<div style="color:var(--muted);">אין פריטים בהזמנות הפעילות של עיר זו.</div>';
  }else{
    content.innerHTML = entries.map(([type,v])=>{
      const cageLabel = CAGE_GROUP_MAP[type] || '';
      const pairNote = v.pairUnits>0 ? `<div style="font-size:12px;color:var(--new-badge);font-weight:700;margin-top:3px;">${v.pairUnits} מתוכם מסומנים זכר ונקבה</div>` : '';
      return `
        <label class="pack-item">
          <input type="checkbox" class="pack-check" style="width:19px;height:19px;margin-top:2px;flex-shrink:0;">
          <div style="flex:1;text-align:right;">
            <div class="pack-item-text" style="font-weight:700;font-size:14px;">${type}</div>
            <div style="font-size:12.5px;color:var(--muted);margin-top:2px;">${v.units} כלוב${v.units>1?'ים':''} · ${v.animals} בעלי חיים${cageLabel?' · '+cageLabel:''}</div>
            ${pairNote}
          </div>
        </label>
      `;
    }).join('');
  }
  document.getElementById('packModal').classList.add('open');
}
document.getElementById('packContent').addEventListener('change', (e)=>{
  if(e.target.classList.contains('pack-check')){
    const label = e.target.closest('.pack-item');
    const textEl = label.querySelector('.pack-item-text');
    if(e.target.checked){ label.style.opacity='0.45'; textEl.style.textDecoration='line-through'; }
    else{ label.style.opacity='1'; textEl.style.textDecoration='none'; }
  }
});
function closePackModal(){ document.getElementById('packModal').classList.remove('open'); }

function showAnimalInfo(rowId){
  const row = document.querySelector('.animal-item[data-row-id="'+rowId+'"]');
  if(!row) return;
  const type = row.querySelector('.animalTypeSelect').value;
  document.getElementById('infoTitle').textContent = type;
  document.getElementById('infoContent').textContent = ANIMAL_INFO[type] || 'אין מידע נוסף על פריט זה כרגע.';
  document.getElementById('infoModal').classList.add('open');
}
function closeInfoModal(){ document.getElementById('infoModal').classList.remove('open'); }

/* ---------- history / shipments ---------- */
function computeShipments(){
  const map = {};
  orders.filter(o=>o.delivered && !o.cancelled).forEach(o=>{
    const key = o.city+'|'+o.deliveryDate;
    if(!map[key]) map[key] = {key, city:o.city, deliveryDate:o.deliveryDate, orders:[], totalQty:0};
    map[key].orders.push(o);
    (o.animals||[]).forEach(a=> map[key].totalQty += a.quantity);
  });
  return Object.values(map).sort((a,b)=> b.deliveryDate.localeCompare(a.deliveryDate));
}
function renderHistory(){
  const search = document.getElementById('historySearch').value.trim();
  const container = document.getElementById('historyList');
  const deliveredOrders = orders.filter(o=>o.delivered && !o.cancelled);

  if(search){
    const matches = deliveredOrders.filter(o=>
      (o.customer||'').includes(search) || (o.phone1||'').includes(search) ||
      (o.phone2||'').includes(search) || (o.city||'').includes(search)
    ).sort((a,b)=> b.deliveryDate.localeCompare(a.deliveryDate));
    if(matches.length===0){ container.innerHTML = `<div class="empty"><div class="big">🔍</div>לא נמצאו תוצאות.</div>`; return; }
    container.innerHTML = matches.map(o=>`
      <div class="city-card">
        <div class="city-head">
          <div class="city-name-wrap"><div class="city-name">${o.customer}</div></div>
          <div class="city-last">משלוח: ${formatDate(o.deliveryDate)} · ${relativeTime(o.deliveryDate)}</div>
        </div>
        <div class="city-totals">${o.city} · הוזמן ב-${formatDate(o.date)}</div>
        <div class="order-sub" style="margin-top:6px;">${formatAnimals(o.animals,o.pairFlags,o.cageSharing)}${o.phone1?' · '+o.phone1:''}${o.phone2?', '+o.phone2:''}${o.address?' · '+o.address:''}</div>
      </div>
    `).join('');
    return;
  }

  const shipments = computeShipments();
  if(shipments.length===0){
    container.innerHTML = `<div class="empty"><div class="big">🚚</div>עדיין אין משלוחים בהיסטוריה.<br>אחרי שמסמנים "משלוח בוצע" בעיר, היא תופיע כאן.</div>`;
    return;
  }
  container.innerHTML = shipments.map(s=>{
    const isOpen = openShipments.has(s.key);
    const rows = s.orders.slice().sort((a,b)=>a.customer.localeCompare(b.customer,'he')).map(o=>`
      <div class="order-row">
        <div>
          <div class="order-main">${o.customer} — ${formatAnimals(o.animals,o.pairFlags,o.cageSharing)}</div>
          <div class="order-sub">הוזמן ב-${formatDate(o.date)}${o.address?' · '+o.address:''}${o.phone1?' · '+o.phone1:''}${o.phone2?', '+o.phone2:''}</div>
        </div>
      </div>
    `).join('');
    return `
      <div class="city-card">
        <div class="city-head">
          <div class="city-name-wrap"><div class="city-name">${s.city}</div></div>
          <div class="city-last">משלוח: ${formatDate(s.deliveryDate)} · ${relativeTime(s.deliveryDate)}</div>
        </div>
        <div class="city-totals">${s.orders.length} לקוחות · ${s.totalQty} בעלי חיים</div>
        <div class="toggle-orders" onclick="toggleShipment('${s.key}')">${isOpen?'הסתר לקוחות ▲':'הצג לקוחות ▼'}</div>
        <div class="city-orders ${isOpen?'open':''}">${rows}</div>
        <button class="btn-ship" onclick="restoreShipment('${s.city}','${s.deliveryDate}')">↩️ החזר לסיכום ערים (בטעות סימנתי)</button>
      </div>
    `;
  }).join('');
}
function toggleShipment(key){
  if(openShipments.has(key)) openShipments.delete(key); else openShipments.add(key);
  renderHistory();
}
function restoreShipment(city, deliveryDate){
  showConfirm(`להחזיר את המשלוח לעיר "${city}" (מ-${formatDate(deliveryDate)}) בחזרה לסיכום ערים הפעיל?`, ()=>{
    let count = 0;
    orders.forEach(o=>{
      if(o.city===city && o.deliveryDate===deliveryDate && o.delivered && !o.cancelled){
        o.delivered = false; o.deliveryDate = ''; count++;
      }
    });
    saveOrders(); renderAll(); showToast(`${count} הזמנות הוחזרו לסיכום ערים`);
  });
}

function renderAll(){ renderSummary(); renderAllOrders(); renderHistory(); }

document.getElementById('citySearch').addEventListener('input', renderSummary);
document.getElementById('orderSearch').addEventListener('input', renderAllOrders);
document.getElementById('historySearch').addEventListener('input', renderHistory);

loadOrders();
</script>
